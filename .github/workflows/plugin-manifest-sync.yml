name: Plugin Manifest Sync Check

on:
  pull_request:
    paths:
      - "plugin.json"
      - ".github/plugin/plugin.json"
      - ".github/workflows/plugin-manifest-sync.yml"
  push:
    branches:
      - main
    paths:
      - "plugin.json"
      - ".github/plugin/plugin.json"
      - ".github/workflows/plugin-manifest-sync.yml"

permissions:
  contents: read

jobs:
  manifests-match:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify plugin manifests are identical
        run: |
          diff -u plugin.json .github/plugin/plugin.json || {
            echo "Error: plugin.json files are not identical. Please keep plugin.json and .github/plugin/plugin.json in sync."
            exit 1
          }
