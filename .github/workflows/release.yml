name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
            binary: rwl
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
            binary: rwl
          - rid: osx-arm64
            runner: macos-latest
            archive: tar.gz
            binary: rwl
          - rid: osx-x64
            runner: macos-13
            archive: tar.gz
            binary: rwl
          - rid: win-x64
            runner: windows-latest
            archive: zip
            binary: rwl.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/Rwl/Rwl.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o dist/${{ matrix.rid }}
          -q

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist/${{ matrix.rid }}
          tar -czf ../../rwl-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz ${{ matrix.binary }}

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/${{ matrix.rid }}/${{ matrix.binary }} `
            -DestinationPath rwl-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwl-${{ matrix.rid }}
          path: rwl-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.archive }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "rwl ${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            artifacts/*

  nuget-publish:
    name: Publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/Rwl/Rwl.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o nupkg \
            -q

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
