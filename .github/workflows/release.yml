name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
            binary: rwl
            copilot_platform: linux-x64
            copilot_binary: copilot
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
            binary: rwl
            copilot_platform: linux-arm64
            copilot_binary: copilot
          - rid: osx-arm64
            runner: macos-latest
            archive: tar.gz
            binary: rwl
            copilot_platform: darwin-arm64
            copilot_binary: copilot
          - rid: osx-x64
            runner: macos-13
            archive: tar.gz
            binary: rwl
            copilot_platform: darwin-x64
            copilot_binary: copilot
          - rid: win-x64
            runner: windows-latest
            archive: zip
            binary: rwl.exe
            copilot_platform: win32-x64
            copilot_binary: copilot.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/Rwl/Rwl.csproj

      # GitHub.Copilot.SDK's _DownloadCopilotCli MSBuild target runs BeforeTargets="BeforeBuild"
      # with no Inputs/Outputs. The .NET 10 question build (speculative incremental check) fails
      # when that target calls MakeDir on a missing directory. Pre-staging the native binary here
      # makes all tasks inside _DownloadCopilotCli skip (their Condition checks Exists(binary)),
      # so the question build sees the target as already up-to-date and the build succeeds.
      - name: Pre-stage Copilot CLI binary
        shell: bash
        run: |
          # dotnet nuget locals gives the correct path on all platforms.
          # On Windows Git Bash, NUGET_PACKAGES is a Windows-style path (C:\...) which
          # breaks bash find; dotnet nuget locals outputs it in native form, so we
          # normalize: backslashes → slashes, C:/ → /C/ for POSIX compatibility.
          RAW=$(dotnet nuget locals global-packages --list | sed 's/^.*global-packages: //' | tr -d '\r\n')
          NUGET_HOME=$(echo "$RAW" | tr '\\' '/' | sed 's|^\([A-Za-z]\):/|/\1/|' | sed 's|/$||')
          PROPS=$(find "$NUGET_HOME/github.copilot.sdk" -name "GitHub.Copilot.SDK.props" 2>/dev/null | sort | tail -1)
          if [ -z "$PROPS" ]; then
            echo "❌ GitHub.Copilot.SDK.props not found under $NUGET_HOME" >&2; exit 1
          fi
          # Use sed (not python3) — python3 cannot open POSIX paths on Windows Git Bash
          VER=$(sed -n 's/.*<CopilotCliVersion>\([^<]*\)<.*/\1/p' "$PROPS" | tr -d '[:space:]\r')
          if [ -z "$VER" ]; then
            echo "❌ Could not parse CopilotCliVersion from $PROPS" >&2; exit 1
          fi
          # dotnet publish -r $RID inserts the RID into IntermediateOutputPath:
          # obj/Release/net10.0/$RID/copilot-cli/...
          DIR="src/Rwl/obj/Release/net10.0/${{ matrix.rid }}/copilot-cli/$VER/${{ matrix.copilot_platform }}"
          mkdir -p "$DIR"
          curl -fsSL "https://registry.npmjs.org/@github/copilot-${{ matrix.copilot_platform }}/-/copilot-${{ matrix.copilot_platform }}-$VER.tgz" \
            | tar -xzf - --strip-components=1 -C "$DIR"
          [ "${{ matrix.copilot_binary }}" != "copilot.exe" ] && chmod +x "$DIR/${{ matrix.copilot_binary }}" || true
          echo "✅ Copilot CLI $VER pre-staged for ${{ matrix.copilot_platform }}"

      - name: Publish
        run: >
          dotnet publish src/Rwl/Rwl.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o dist/${{ matrix.rid }}
          --no-restore

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist/${{ matrix.rid }}
          tar -czf ../../rwl-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz ${{ matrix.binary }}

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/${{ matrix.rid }}/${{ matrix.binary }} `
            -DestinationPath rwl-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwl-${{ matrix.rid }}
          path: rwl-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.archive }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "rwl ${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            artifacts/*

  nuget-publish:
    name: Publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore NuGet packages
        run: dotnet restore src/Rwl/Rwl.csproj

      - name: Pre-stage Copilot CLI binary (linux-x64)
        run: |
          RAW=$(dotnet nuget locals global-packages --list | sed 's/^.*global-packages: //' | tr -d '\r\n')
          NUGET_HOME=$(echo "$RAW" | tr '\\' '/' | sed 's|^\([A-Za-z]\):/|/\1/|' | sed 's|/$||')
          PROPS=$(find "$NUGET_HOME/github.copilot.sdk" -name "GitHub.Copilot.SDK.props" 2>/dev/null | sort | tail -1)
          if [ -z "$PROPS" ]; then
            echo "❌ GitHub.Copilot.SDK.props not found under $NUGET_HOME" >&2; exit 1
          fi
          VER=$(sed -n 's/.*<CopilotCliVersion>\([^<]*\)<.*/\1/p' "$PROPS" | tr -d '[:space:]\r')
          if [ -z "$VER" ]; then
            echo "❌ Could not parse CopilotCliVersion from $PROPS" >&2; exit 1
          fi
          DIR="src/Rwl/obj/Release/net10.0/copilot-cli/$VER/linux-x64"
          mkdir -p "$DIR"
          curl -fsSL "https://registry.npmjs.org/@github/copilot-linux-x64/-/copilot-linux-x64-$VER.tgz" \
            | tar -xzf - --strip-components=1 -C "$DIR"
          chmod +x "$DIR/copilot"
          echo "✅ Copilot CLI $VER pre-staged for linux-x64 (NuGet pack)"

      - name: Pack
        run: |
          dotnet pack src/Rwl/Rwl.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o nupkg \
            --no-restore

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
